version: '3.8'

services:
  fms-odata-mcp:
    build: .
    image: fms-odata-mcp:latest
    container_name: fms-odata-mcp
    restart: unless-stopped
    ports:
      - "3333:3333"
    environment:
      # FileMaker connection - replace with your values
      - FM_SERVER=https://your-filemaker-server.com/fmi/odata/v4
      - FM_DATABASE=YourDatabase
      - FM_USER=your-username
      - FM_PASSWORD=your-password
      - FM_VERIFY_SSL=false
      # Server configuration
      - MCP_TRANSPORT=http
      - MCP_PORT=3333
      - MCP_HOST=0.0.0.0
    volumes:
      # Mount config directory for persistent connections
      - ~/.fms-odata-mcp:/home/mcp/.fms-odata-mcp
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3333/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Nginx reverse proxy for HTTPS
  nginx:
    image: nginx:alpine
    container_name: fms-odata-mcp-nginx
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - fms-odata-mcp
    profiles:
      - https
